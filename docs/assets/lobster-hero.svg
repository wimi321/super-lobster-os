      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#102746"/>
      <stop offset="1" stop-color="#1C4B5A"/>
    </linearGradient>
    <linearGradient id="accent" x1="864" y1="108" x2="1094" y2="525" gradientUnits="userSpaceOnUse">

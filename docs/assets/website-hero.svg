  <text x="112" y="438" fill="#d8e4f2" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="400" letter-spacing="0">Super Lobster OS brings mission planning, </text><text x="112" y="478" fill="#d8e4f2" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="400" letter-spacing="0">safety policy, routing, and persistent workspace </text><text x="112" y="518" fill="#d8e4f2" font-family="Helvetica, Arial, sans-serif" font-size="31" font-weight="400" letter-spacing="0">memory into one operator-grade layer.</text>
  

<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="surface" x1="112" y1="64" x2="1076" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#F4FBF9"/>
    </linearGradient>
    <linearGradient id="connector" x1="170" y1="262" x2="1022" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#surface)"/>
  <text x="76" y="82" fill="#172033" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700">Super Lobster OS Mission Flow</text>
  <text x="76" y="120" fill="#475569" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="20">A workspace operating layer that decides what to do, where to do it, and how safely to do it.</text>

  <line x1="206" y1="286" x2="996" y2="286" stroke="url(#connector)" stroke-width="12" stroke-linecap="round"/>

  <g>
    <rect x="80" y="198" width="210" height="170" rx="22" fill="#0F172A"/>
    <text x="112" y="244" fill="#FDBA74" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">INPUT</text>
    <text x="112" y="286" fill="white" font-family="Georgia, 'Times New Roman', serif" font-size="34">Mission</text>
    <text x="112" y="320" fill="#CBD5E1" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">User goal, repo state,</text>
    <text x="112" y="344" fill="#CBD5E1" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">team memory, constraints.</text>
  </g>

  <g>
    <rect x="338" y="168" width="210" height="226" rx="22" fill="#FFF" stroke="#FED7AA"/>
    <text x="370" y="214" fill="#C2410C" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">THINK</text>
    <text x="370" y="256" fill="#172033" font-family="Georgia, 'Times New Roman', serif" font-size="34">Plan</text>
    <text x="370" y="292" fill="#475569" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">Turns prompts into</text>
    <text x="370" y="316" fill="#475569" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">sequenced, legible steps.</text>
    <text x="370" y="360" fill="#0F766E" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="16">Workspace-aware</text>
  </g>

  <g>
    <rect x="596" y="168" width="210" height="226" rx="22" fill="#FFF" stroke="#BFDBFE"/>
    <text x="628" y="214" fill="#1D4ED8" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">PROTECT</text>
    <text x="628" y="256" fill="#172033" font-family="Georgia, 'Times New Roman', serif" font-size="34">Guard</text>
    <text x="628" y="292" fill="#475569" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">Scores commands as</text>
    <text x="628" y="316" fill="#475569" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">allow, review, or deny.</text>
    <text x="628" y="360" fill="#C2410C" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="16">Safety-first</text>
  </g>

  <g>
    <rect x="854" y="168" width="266" height="226" rx="22" fill="#FFF" stroke="#A7F3D0"/>
    <text x="886" y="214" fill="#0F766E" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">ORCHESTRATE</text>
    <text x="886" y="256" fill="#172033" font-family="Georgia, 'Times New Roman', serif" font-size="34">Route + Remember</text>
    <text x="886" y="292" fill="#475569" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">Chooses terminal, GitHub,</text>
    <text x="886" y="316" fill="#475569" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">Slack, or mobile surfaces.</text>
    <text x="886" y="360" fill="#0F766E" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="16">Multi-surface memory</text>
  </g>

  <text x="78" y="482" fill="#64748B" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="18">Current alpha: config init, mission planning, command safety, report export, channel routing, persistent workspace memory.</text>
</svg>

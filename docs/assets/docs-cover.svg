  <text x="100" y="388" fill="#d8e4f2" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="0">Architecture, roadmap, and comparison pages should look </text><text x="100" y="424" fill="#d8e4f2" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="0">like they belong to the same system.</text>
  
